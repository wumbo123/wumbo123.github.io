<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Image Tools - All in One</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background-color: #f8fafc; }
        
        .tab-btn { transition: all 0.2s ease; }
        .tab-btn.active { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.3); }
        
        .direction-btn { transition: all 0.2s; }
        .direction-btn.active { border-color: #6366f1; background: #f5f3ff; color: #6366f1; }
        
        #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        
        .grid-line { position: absolute; background-color: rgba(255,255,255,0.85); box-shadow: 0 0 3px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="min-h-screen pb-20">
    <canvas id="bgCanvas"></canvas>
    
    <div class="max-w-2xl mx-auto px-4 py-6 relative z-10">
        <header class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-black text-gray-800 mb-1">Image Tools</h1>
            <p class="text-xs text-gray-500 font-medium">Split • Resize • Crop</p>
        </header>

        <div class="flex gap-2 mb-8 overflow-x-auto pb-2">
            <button onclick="switchTab('split')" class="tab-btn active flex-1 px-4 py-3 rounded-xl font-bold text-sm uppercase tracking-wide whitespace-nowrap" id="tab-split">
                <span class="block text-lg mb-1">🖼️</span> Split
            </button>
            <button onclick="switchTab('resize')" class="tab-btn flex-1 px-4 py-3 rounded-xl font-bold text-sm uppercase tracking-wide whitespace-nowrap bg-white text-gray-600" id="tab-resize">
                <span class="block text-lg mb-1">📐</span> Resize
            </button>
            <button onclick="switchTab('crop')" class="tab-btn flex-1 px-4 py-3 rounded-xl font-bold text-sm uppercase tracking-wide whitespace-nowrap bg-white text-gray-600" id="tab-crop">
                <span class="block text-lg mb-1">✂️</span> Crop
            </button>
        </div>

        <!-- SPLIT TAB -->
        <div id="content-split" class="tab-content active space-y-6">
            <div class="glass-panel p-6 rounded-2xl shadow-sm text-center">
                <label class="block text-xs font-bold text-gray-500 mb-3 uppercase text-left">Unggah Gambar</label>
                <input type="file" id="split-fileInput" accept="image/*" class="hidden" onchange="splitHandleImage(event)">
                <label for="split-fileInput" class="block w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-bold rounded-xl cursor-pointer hover:opacity-90 transition">
                    + Upload Gambar
                </label>
                <p id="split-filename" class="mt-3 text-xs text-gray-500 font-medium hidden"></p>
            </div>

            <div id="split-settings" class="hidden space-y-4">
                <div class="glass-panel p-5 rounded-2xl shadow-sm">
                    <label class="block text-xs font-bold text-gray-500 mb-3 uppercase">Arah Potongan</label>
                    <div class="grid grid-cols-3 gap-2 mb-4">
                        <button onclick="splitSetDir('vertical')" id="split-dir-vert" class="direction-btn direction-split p-3 rounded-lg border-2 border-gray-100 text-center">
                            <span class="block text-lg mb-1">↔️</span>
                            <span class="text-xs font-bold">Vertikal</span>
                        </button>
                        <button onclick="splitSetDir('horizontal')" id="split-dir-horiz" class="direction-btn direction-split p-3 rounded-lg border-2 border-gray-100 text-center">
                            <span class="block text-lg mb-1">↕️</span>
                            <span class="text-xs font-bold">Horizontal</span>
                        </button>
                        <button onclick="splitSetDir('both')" id="split-dir-both" class="direction-btn direction-split p-3 rounded-lg border-2 border-purple-500 bg-purple-50 text-purple-700 active">
                            <span class="block text-lg mb-1">⊞</span>
                            <span class="text-xs font-bold">Grid</span>
                        </button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Baris</label>
                            <input type="number" id="split-rows" value="2" min="1" class="w-full p-3 border-2 border-gray-100 rounded-lg focus:border-purple-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Kolom</label>
                            <input type="number" id="split-cols" value="1" min="1" class="w-full p-3 border-2 border-gray-100 rounded-lg focus:border-purple-500 outline-none">
                        </div>
                    </div>
                </div>

                <button onclick="splitGenerate()" class="w-full py-4 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-black rounded-xl shadow-lg hover:opacity-90 transition">
                    POTONG GAMBAR
                </button>
            </div>

            <div id="split-preview" class="hidden">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-bold text-gray-700">Hasil Potongan</h3>
                    <button onclick="splitDownloadAll()" class="px-4 py-2 bg-green-500 text-white text-xs font-bold rounded-full shadow">UNDUH SEMUA (.ZIP)</button>
                </div>
                <div id="split-results" class="grid grid-cols-3 gap-3"></div>
            </div>
        </div>

        <!-- RESIZE TAB -->
        <div id="content-resize" class="tab-content space-y-6">
            <div class="glass-panel p-6 rounded-2xl shadow-sm text-center">
                <label class="block text-xs font-bold text-gray-500 mb-3 uppercase text-left">Unggah Gambar</label>
                <input type="file" id="resize-fileInput" accept="image/*" class="hidden" onchange="resizeHandleImage(event)">
                <label for="resize-fileInput" class="block w-full py-4 bg-gradient-to-r from-sky-500 to-cyan-500 text-white font-bold rounded-xl cursor-pointer hover:opacity-90 transition">
                    + Upload Gambar
                </label>
                <p id="resize-filename" class="mt-3 text-xs text-gray-500 font-medium hidden"></p>
            </div>

            <div id="resize-settings" class="hidden space-y-4">
                <div class="glass-panel p-5 rounded-2xl shadow-sm">
                    <label class="block text-xs font-bold text-gray-500 mb-3 uppercase">Ukuran Baru (px)</label>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Lebar</label>
                            <input type="number" id="resize-width" class="w-full p-3 border-2 border-gray-100 rounded-lg focus:border-sky-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Tinggi</label>
                            <input type="number" id="resize-height" class="w-full p-3 border-2 border-gray-100 rounded-lg focus:border-sky-500 outline-none">
                        </div>
                    </div>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="resize-aspect" checked class="w-4 h-4 text-sky-500">
                        <span class="text-xs font-medium text-gray-600">Pertahankan proporsi</span>
                    </label>
                </div>

                <button onclick="resizeGenerate()" class="w-full py-4 bg-gradient-to-r from-sky-500 to-emerald-500 text-white font-black rounded-xl shadow-lg hover:opacity-90 transition">
                    GENERATE
                </button>
            </div>

            <div id="resize-result" class="hidden text-center">
                <div class="inline-block p-3 bg-white rounded-xl shadow-lg mb-4">
                    <canvas id="resize-canvas" class="max-w-full h-auto rounded-lg"></canvas>
                </div>
                <br>
                <button onclick="resizeDownload()" class="px-8 py-3 bg-emerald-500 text-white font-bold rounded-xl shadow hover:bg-emerald-600 transition inline-flex items-center gap-2">
                    UNDUH GAMBAR
                </button>
            </div>
        </div>

        <!-- CROP TAB -->
        <div id="content-crop" class="tab-content space-y-6">
            <div class="glass-panel p-6 rounded-2xl shadow-sm text-center">
                <label class="block text-xs font-bold text-gray-500 mb-3 uppercase text-left">Unggah Gambar</label>
                <input type="file" id="crop-fileInput" accept="image/*" class="hidden" onchange="cropHandleImage(event)">
                <label for="crop-fileInput" class="block w-full py-4 bg-gradient-to-r from-blue-500 to-indigo-500 text-white font-bold rounded-xl cursor-pointer hover:opacity-90 transition">
                    + Upload Gambar
                </label>
                <p id="crop-filename" class="mt-3 text-xs text-gray-500 font-medium hidden"></p>
            </div>

            <div id="crop-settings" class="hidden space-y-4">
                <div class="glass-panel p-5 rounded-2xl shadow-sm">
                    <label class="block text-xs font-bold text-gray-500 mb-3 uppercase">Arah Potongan</label>
                    <div class="grid grid-cols-3 gap-2 mb-4">
                        <button onclick="cropSetDir('horizontal')" id="crop-dir-horiz" class="direction-btn direction-crop p-3 rounded-lg border-2 border-gray-100 text-center">
                            <span class="text-xs font-bold">Horizontal</span>
                        </button>
                        <button onclick="cropSetDir('vertical')" id="crop-dir-vert" class="direction-btn direction-crop p-3 rounded-lg border-2 border-gray-100 text-center">
                            <span class="text-xs font-bold">Vertikal</span>
                        </button>
                        <button onclick="cropSetDir('both')" id="crop-dir-both" class="direction-btn direction-crop p-3 rounded-lg border-2 border-blue-500 bg-blue-50 text-blue-700 active">
                            <span class="text-xs font-bold">Grid</span>
                        </button>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Kolom</label>
                            <input type="number" id="crop-cols" value="1" min="1" class="w-full p-3 border-2 border-gray-100 rounded-lg focus:border-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Baris</label>
                            <input type="number" id="crop-rows" value="1" min="1" class="w-full p-3 border-2 border-gray-100 rounded-lg focus:border-blue-500 outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Lebar Output (px)</label>
                            <input type="number" id="crop-out-width" value="1080" min="1" class="w-full p-3 border-2 border-gray-100 rounded-lg focus:border-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Tinggi Output (px)</label>
                            <input type="number" id="crop-out-height" value="1080" min="1" class="w-full p-3 border-2 border-gray-100 rounded-lg focus:border-blue-500 outline-none">
                        </div>
                    </div>
                    <p id="crop-info" class="mt-3 text-xs text-gray-500"></p>
                </div>

                <div class="relative inline-block w-full border-2 border-gray-200 rounded-lg overflow-hidden">
                    <img id="crop-preview-img" class="max-w-full h-auto block" src="" alt="">
                    <div id="crop-grid-overlay"></div>
                </div>

                <button onclick="cropGenerate()" class="w-full py-4 bg-gradient-to-r from-blue-500 to-indigo-500 text-white font-black rounded-xl shadow-lg hover:opacity-90 transition">
                    POTONG GAMBAR
                </button>
            </div>

            <div id="crop-result" class="hidden space-y-4">
                <div class="flex items-center justify-between">
                    <h3 class="font-bold text-gray-700">Hasil Potongan</h3>
                    <button onclick="cropDownloadAll()" class="px-4 py-2 bg-green-500 text-white text-xs font-bold rounded-full shadow">UNDUH SEMUA (.ZIP)</button>
                </div>
                <div id="crop-results" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
            </div>
        </div>
    </div>

    <script>
        // Background Animation
        const bgCanvas = document.getElementById('bgCanvas');
        const bgCtx = bgCanvas.getContext('2d');
        let bw, bh, dolphins = [], ripples = [];
        
        function resizeBg() { bw = bgCanvas.width = window.innerWidth; bh = bgCanvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeBg);
        resizeBg();
        
        class Ripple {
            constructor(x, y) { this.x = x; this.y = y; this.r = 2; this.o = 0.5; }
            update() { this.r += 2; this.o -= 0.015; }
            draw() {
                if (this.o <= 0) return;
                bgCtx.beginPath(); bgCtx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                bgCtx.strokeStyle = `rgba(99, 102, 241, ${this.o})`; bgCtx.lineWidth = 2; bgCtx.stroke();
            }
        }
        
        class Dolphin {
            constructor() { this.reset(); }
            reset() {
                this.side = Math.random() > 0.5 ? 1 : -1;
                this.x = this.side === 1 ? -120 : bw + 120;
                this.y = bh * 0.9 + 80;
                this.vx = (2 + Math.random() * 3) * this.side;
                this.vy = -(12 + Math.random() * 5);
                this.gravity = 0.35;
                this.size = 0.4 + Math.random() * 0.2;
                this.angle = 0;
                this.inAir = false;
                this.hasSplat = false;
            }
            update() {
                this.x += this.vx; this.y += this.vy; this.vy += this.gravity;
                this.angle = Math.atan2(this.vy, this.vx);
                if (this.y < bh * 0.9) this.inAir = true;
                else if (this.inAir && this.y >= bh * 0.9) {
                    if (!this.hasSplat) { ripples.push(new Ripple(this.x, bh * 0.9)); this.hasSplat = true; }
                    if (this.y > bh * 0.9 + 150) this.reset();
                }
                if (this.x > bw + 300 || this.x < -300) this.reset();
            }
            draw() {
                bgCtx.save(); bgCtx.translate(this.x, this.y); bgCtx.rotate(this.angle); bgCtx.scale(this.size, this.size);
                bgCtx.fillStyle = '#6366f1';
                bgCtx.beginPath(); bgCtx.ellipse(0, 0, 40, 12, 0, 0, Math.PI * 2); bgCtx.fill();
                bgCtx.beginPath(); bgCtx.moveTo(-5, -10); bgCtx.quadraticCurveTo(-15, -25, -22, -4); bgCtx.fill();
                bgCtx.beginPath(); bgCtx.moveTo(-38, 0); bgCtx.lineTo(-55, -12); bgCtx.lineTo(-55, 12); bgCtx.closePath(); bgCtx.fill();
                bgCtx.fillStyle = '#e0e7ff';
                bgCtx.beginPath(); bgCtx.ellipse(5, 4, 28, 6, 0, 0, Math.PI * 2); bgCtx.fill();
                bgCtx.restore();
            }
        }
        
        function drawSea() {
            let g = bgCtx.createLinearGradient(0, bh * 0.9, 0, bh);
            g.addColorStop(0, 'rgba(99, 102, 241, 0.15)'); g.addColorStop(1, 'rgba(79, 70, 229, 0.3)');
            bgCtx.beginPath(); bgCtx.moveTo(0, bh); bgCtx.lineTo(0, bh * 0.9);
            for (let i = 0; i <= bw; i += 20) bgCtx.lineTo(i, bh * 0.9 + Math.sin(i * 0.01 + Date.now() * 0.002) * 5);
            bgCtx.lineTo(bw, bh); bgCtx.fillStyle = g; bgCtx.fill();
        }
        
        function animate() {
            bgCtx.clearRect(0, 0, bw, bh);
            ripples.forEach((r, i) => { r.update(); r.draw(); if (r.o <= 0) ripples.splice(i, 1); });
            dolphins.forEach(d => { d.update(); d.draw(); });
            drawSea(); requestAnimationFrame(animate);
        }
        
        for (let i = 0; i < 2; i++) setTimeout(() => dolphins.push(new Dolphin()), i * 2500);
        animate();

        // Tab Switching
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'bg-white', 'text-gray-600'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            const btn = document.getElementById(`tab-${tab}`);
            btn.classList.add('active');
            btn.classList.remove('bg-white', 'text-gray-600');
            document.getElementById(`content-${tab}`).classList.add('active');
        }

        // SPLIT FUNCTIONALITY
        let splitImg = null;
        let splitFileName = '';
        let splitDir = 'both';
        
        function splitHandleImage(e) {
            const file = e.target.files[0];
            if (!file) return;
            splitFileName = file.name;
            const reader = new FileReader();
            reader.onload = (ev) => {
                splitImg = new Image();
                splitImg.onload = () => {
                    document.getElementById('split-filename').textContent = file.name;
                    document.getElementById('split-filename').classList.remove('hidden');
                    document.getElementById('split-settings').classList.remove('hidden');
                    document.getElementById('split-preview').classList.add('hidden');
                };
                splitImg.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function splitSetDir(dir) {
            splitDir = dir;
            document.querySelectorAll('.direction-split').forEach(b => {
                b.classList.remove('active', 'border-purple-500', 'bg-purple-50', 'text-purple-700');
                b.classList.add('border-gray-100');
            });
            const btn = document.getElementById(dir === 'vertical' ? 'split-dir-vert' : dir === 'horizontal' ? 'split-dir-horiz' : 'split-dir-both');
            btn.classList.add('active', 'border-purple-500', 'bg-purple-50', 'text-purple-700');
            btn.classList.remove('border-gray-100');
            
            if (dir === 'horizontal') {
                document.getElementById('split-rows').value = 1;
            } else if (dir === 'vertical') {
                document.getElementById('split-cols').value = 1;
            }
        }
        
        function splitGenerate() {
            if (!splitImg) return;
            const rows = parseInt(document.getElementById('split-rows').value) || 2;
            const cols = parseInt(document.getElementById('split-cols').value) || 1;
            const container = document.getElementById('split-results');
            container.innerHTML = '';
            
            const zip = new JSZip();
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const sw = splitImg.width / cols;
                    const sh = splitImg.height / rows;
                    const sx = c * sw;
                    const sy = r * sh;
                    
                    canvas.width = sw; canvas.height = sh;
                    ctx.drawImage(splitImg, sx, sy, sw, sh, 0, 0, sw, sh);
                    
                    const url = canvas.toDataURL('image/png');
                    const fname = `split_r${r+1}_c${c+1}.png`;
                    
                    const div = document.createElement('div');
                    div.className = 'bg-white p-2 rounded-lg shadow text-center';
                    div.innerHTML = `<img src="${url}" class="w-full h-auto rounded mb-2"><a href="${url}" download="${fname}" class="text-xs bg-purple-100 text-purple-700 px-3 py-1 rounded font-bold">Unduh</a>`;
                    container.appendChild(div);
                    
                    zip.file(fname, url.split(',')[1], {base64: true});
                }
            }
            
            document.getElementById('split-preview').classList.remove('hidden');
            window.splitZip = zip;
        }
        
        function splitDownloadAll() {
            if (!window.splitZip) return;
            window.splitZip.generateAsync({type:'blob'}).then(blob => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'split_images.zip';
                a.click();
            });
        }

        // RESIZE FUNCTIONALITY
        let resizeImg = null;
        
        function resizeHandleImage(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                resizeImg = new Image();
                resizeImg.onload = () => {
                    document.getElementById('resize-filename').textContent = file.name;
                    document.getElementById('resize-filename').classList.remove('hidden');
                    document.getElementById('resize-width').value = resizeImg.width;
                    document.getElementById('resize-height').value = resizeImg.height;
                    document.getElementById('resize-settings').classList.remove('hidden');
                    document.getElementById('resize-result').classList.add('hidden');
                };
                resizeImg.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        document.getElementById('resize-width').addEventListener('input', () => {
            if (document.getElementById('resize-aspect').checked && resizeImg) {
                const ratio = resizeImg.height / resizeImg.width;
                document.getElementById('resize-height').value = Math.round(document.getElementById('resize-width').value * ratio);
            }
        });
        
        document.getElementById('resize-height').addEventListener('input', () => {
            if (document.getElementById('resize-aspect').checked && resizeImg) {
                const ratio = resizeImg.width / resizeImg.height;
                document.getElementById('resize-width').value = Math.round(document.getElementById('resize-height').value * ratio);
            }
        });
        
        function resizeGenerate() {
            if (!resizeImg) return;
            const w = parseInt(document.getElementById('resize-width').value);
            const h = parseInt(document.getElementById('resize-height').value);
            const canvas = document.getElementById('resize-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = w; canvas.height = h;
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, w, h);
            ctx.drawImage(resizeImg, 0, 0, w, h);
            document.getElementById('resize-result').classList.remove('hidden');
        }
        
        function resizeDownload() {
            const canvas = document.getElementById('resize-canvas');
            const a = document.createElement('a');
            a.download = `resized_${canvas.width}x${canvas.height}.png`;
            a.href = canvas.toDataURL('image/png');
            a.click();
        }

        // CROP FUNCTIONALITY
        let cropImg = null;
        let cropFileName = '';
        let cropDir = 'both';
        
        function cropHandleImage(e) {
            const file = e.target.files[0];
            if (!file) return;
            cropFileName = file.name;
            const reader = new FileReader();
            reader.onload = (ev) => {
                cropImg = new Image();
                cropImg.onload = () => {
                    document.getElementById('crop-filename').textContent = file.name;
                    document.getElementById('crop-filename').classList.remove('hidden');
                    document.getElementById('crop-settings').classList.remove('hidden');
                    document.getElementById('crop-result').classList.add('hidden');
                    document.getElementById('crop-preview-img').src = ev.target.result;
                    cropUpdateGrid();
                };
                cropImg.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function cropSetDir(dir) {
            cropDir = dir;
            document.querySelectorAll('.direction-btn').forEach(b => b.classList.remove('active', 'border-blue-500', 'bg-blue-50', 'text-blue-700', 'border-gray-100'));
            const btn = document.getElementById(dir === 'horizontal' ? 'crop-dir-horiz' : dir === 'vertical' ? 'crop-dir-vert' : 'crop-dir-both');
            btn.classList.add('active', 'border-blue-500', 'bg-blue-50', 'text-blue-700');
            
            if (dir === 'horizontal') {
                document.getElementById('crop-rows').value = 1;
                document.getElementById('crop-rows').disabled = true;
                document.getElementById('crop-cols').disabled = false;
            } else if (dir === 'vertical') {
                document.getElementById('crop-cols').value = 1;
                document.getElementById('crop-cols').disabled = true;
                document.getElementById('crop-rows').disabled = false;
            } else {
                document.getElementById('crop-rows').disabled = false;
                document.getElementById('crop-cols').disabled = false;
            }
            cropUpdateGrid();
        }
        
        function cropUpdateGrid() {
            if (!cropImg) return;
            const cols = parseInt(document.getElementById('crop-cols').value) || 1;
            const rows = parseInt(document.getElementById('crop-rows').value) || 1;
            const overlay = document.getElementById('crop-grid-overlay');
            overlay.innerHTML = '';
            overlay.style.position = 'absolute';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100%';
            overlay.style.height = '100%';
            
            for (let i = 1; i < cols; i++) {
                const l = document.createElement('div');
                l.className = 'grid-line';
                l.style.left = `${(i/cols)*100}%`; l.style.width = '2px'; l.style.height = '100%';
                overlay.appendChild(l);
            }
            for (let i = 1; i < rows; i++) {
                const l = document.createElement('div');
                l.className = 'grid-line';
                l.style.top = `${(i/rows)*100}%`; l.style.height = '2px'; l.style.width = '100%';
                overlay.appendChild(l);
            }
        }
        
        document.getElementById('crop-cols').addEventListener('input', cropUpdateGrid);
        document.getElementById('crop-rows').addEventListener('input', cropUpdateGrid);
        
        function cropGenerate() {
            if (!cropImg) return;
            const cols = parseInt(document.getElementById('crop-cols').value) || 1;
            const rows = parseInt(document.getElementById('crop-rows').value) || 1;
            const container = document.getElementById('crop-results');
            container.innerHTML = '';
            
            const zip = new JSZip();
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1080;
            canvas.height = 1080;
            
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const sx = (c / cols) * cropImg.width;
                    const sy = (r / rows) * cropImg.height;
                    const sw = cropImg.width / cols;
                    const sh = cropImg.height / rows;
                    
                    ctx.clearRect(0, 0, 1080, 1080);
                    ctx.drawImage(cropImg, sx, sy, sw, sh, 0, 0, 1080, 1080);
                    
                    const url = canvas.toDataURL('image/webp', 0.9);
                    const fname = `crop_r${r+1}_c${c+1}.webp`;
                    
                    const div = document.createElement('div');
                    div.className = 'bg-white p-2 rounded-lg shadow text-center';
                    div.innerHTML = `<img src="${url}" class="w-full h-auto rounded mb-2"><a href="${url}" download="${fname}" class="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded font-bold">Unduh</a>`;
                    container.appendChild(div);
                    
                    zip.file(fname, url.split(',')[1], {base64: true});
                }
            }
            
            document.getElementById('crop-result').classList.remove('hidden');
            window.cropZip = zip;
        }
        
        function cropDownloadAll() {
            if (!window.cropZip) return;
            window.cropZip.generateAsync({type:'blob'}).then(blob => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'crop_images.zip';
                a.click();
            });
        }
    </script>
</body>
</html>
