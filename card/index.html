<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Files</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0d1117;
            min-height: 100vh;
            color: #c9d1d9;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #30363d;
        }

        header h1 {
            font-size: 1.8rem;
            color: #58a6ff;
            margin-bottom: 8px;
        }

        header p {
            color: #8b949e;
            font-size: 0.9rem;
        }

        .path {
            font-family: 'JetBrains Mono', monospace;
            color: #7ee787;
            font-size: 0.85rem;
            background: #161b22;
            padding: 8px 12px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .file-list {
            background: #161b22;
            border-radius: 8px;
            border: 1px solid #30363d;
            overflow: hidden;
        }

        .file-header {
            display: grid;
            grid-template-columns: 1fr 100px 120px;
            padding: 12px 20px;
            background: #21262d;
            font-size: 0.75rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .file-item {
            display: grid;
            grid-template-columns: 1fr 100px 120px;
            padding: 14px 20px;
            border-bottom: 1px solid #30363d;
            transition: background 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item:hover {
            background: #1f2428;
        }

        .file-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-icon {
            font-size: 1.2rem;
        }

        .file-icon.html { color: #e34c26; }
        .file-icon.js { color: #f7df1e; }
        .file-icon.txt { color: #8b949e; }

        .file-size, .file-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #8b949e;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            color: #484f58;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Index of /</h1>
            <p>Server File Listing</p>
        </header>

        <div class="path" id="currentPath">/root/card</div>

        <div class="file-list">
            <div class="file-header">
                <span>Name</span>
                <span>Size</span>
                <span>Modified</span>
            </div>
            <a href="card.html" class="file-item">
                <div class="file-name">
                    <span class="file-icon html">📄</span>
                    <span>card.html</span>
                </div>
            </a>
            <a href="hd.html" class="file-item">
                <div class="file-name">
                    <span class="file-icon html">🖼️</span>
                    <span>hd.html</span>
                </div>
            </a>
        </div>

        <footer>
            <span id="serverIP">Server running</span>
        </footer>
    </div>
    <script>
        document.getElementById('serverIP').textContent = window.location.hostname;
        document.getElementById('currentPath').textContent = window.location.pathname === '/' ? '/' : window.location.pathname;
    </script>
</body>
</html>
