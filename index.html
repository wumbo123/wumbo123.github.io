<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wumbo123 - Image Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Space Mono', monospace;
      background: #0d0d0d;
      color: #f5f5f5;
      min-height: 100vh;
      padding: 40px 20px 60px;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      margin-bottom: 50px;
    }
    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -2px;
      margin-bottom: 8px;
    }
    header h1 span {
      color: #ff6b35;
    }
    header p {
      color: #666;
      font-size: 0.85rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    @media (max-width: 540px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 24px;
      transition: all 0.2s ease;
      text-decoration: none;
      display: block;
    }
    .card:hover {
      background: #1a1a1a;
      border-color: #333;
      transform: translateY(-2px);
    }
    .card-top {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .card-icon {
      width: 44px;
      height: 44px;
      background: #1a1a1a;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .card-info {
      flex: 1;
      min-width: 0;
    }
    .card-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #f5f5f5;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-desc {
      font-size: 0.7rem;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .expand-btns {
      display: none;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #222;
    }
    .card.has-sub .expand-btns {
      display: none;
    }
    .card.has-sub.expanded .expand-btns {
      display: block;
    }
    .toggle-btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      background: transparent;
      border: 1px dashed #333;
      border-radius: 8px;
      color: #555;
      font-family: inherit;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: center;
    }
    .toggle-btn:hover {
      border-color: #555;
      color: #888;
    }
    .sub-item {
      display: block;
      padding: 10px 12px;
      margin-bottom: 6px;
      background: #1a1a1a;
      border-radius: 8px;
      font-size: 0.75rem;
      color: #888;
      text-decoration: none;
      transition: all 0.15s ease;
    }
    .sub-item:hover {
      background: #222;
      color: #f5f5f5;
    }
    .sub-item:last-child {
      margin-bottom: 0;
    }
    .toggle-btn {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      background: transparent;
      border: 1px dashed #333;
      border-radius: 8px;
      color: #555;
      font-family: inherit;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .toggle-btn:hover {
      border-color: #555;
      color: #888;
    }
    footer {
      text-align: center;
      margin-top: 50px;
      padding-top: 20px;
      border-top: 1px solid #1a1a1a;
    }
    footer p {
      color: #333;
      font-size: 0.7rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>wumbo<span>123</span></h1>
      <p>image processing tools</p>
    </header>

    <div class="grid" id="toolsGrid">
    </div>

    <footer>
      <p>simple tools for everyday needs</p>
    </footer>
  </div>

  <script>
    const tools = [
      {
        name: "Resizer & Cropper",
        desc: "Resize dan potong gambar",
        path: "image-resizer-cropper/backup/index.html",
        icon: "📐",
        subfiles: [
          { name: "Full Version", path: "image-resizer-cropper/backup/index.html" },
          { name: "Simple Version", path: "image-resizer-cropper/backup/1.html" }
        ]
      },
      {
        name: "Border Editor",
        desc: "Tambah border pada gambar",
        path: "border-editor/index.html",
        icon: "🖼️"
      },
      {
        name: "Circle Crop",
        desc: "Buat foto bulat",
        path: "circle-crop/index.html",
        icon: "⭕"
      },
      {
        name: "Fantasy Card",
        desc: "Buat kartu fantasy HD",
        path: "fantasy-card/index.html",
        icon: "📦"
      },
      {
        name: "Upscaler",
        desc: "Perbesar gambar",
        path: "upscaler/index.html",
        icon: "🆙"
      },
      {
        name: "Datasheet",
        desc: "Buat datasheet",
        path: "datasheet-builder/index.html",
        icon: "📋"
      },
      {
        name: "Template",
        desc: "Live preview",
        path: "template-engine/index.html",
        icon: "📝"
      },
      {
        name: "Tool v1",
        desc: "Resize & crop alt",
        path: "tool-v1/index.html",
        icon: "🔧"
      },
      {
        name: "Tool v2",
        desc: "Resize & crop alt",
        path: "tool-v2/index.html",
        icon: "🔩"
      },
      {
        name: "Random Code",
        desc: "Generate kode",
        path: "random-code/index.html",
        icon: "•",
        subfiles: [
          { name: "Random Code", path: "random-code/index.html" },
          { name: "Cropping", path: "random-code/cropping.html" },
          { name: "Resize", path: "random-code/resize.html" },
          { name: "Test", path: "random-code/test.html" }
        ]
      }
    ];

    const grid = document.getElementById('toolsGrid');

    tools.forEach((tool, idx) => {
      const card = document.createElement('a');
      card.className = 'card' + (tool.subfiles ? ' has-sub' : '');
      card.href = tool.path;

      const subCount = tool.subfiles ? tool.subfiles.length + ' file' : '';

      const subfilesHTML = tool.subfiles ? `
        <div class="expand-btns">
          ${tool.subfiles.map(f => 
            `<a href="${f.path}" class="sub-item">${f.name}</a>`
          ).join('')}
        </div>
        <button class="toggle-btn" data-count="${subCount}" onclick="toggleSub(event, ${idx})">↓ Lihat ${subCount}</button>
      ` : '';

      card.innerHTML = `
        <div class="card-top">
          <div class="card-icon">${tool.icon}</div>
          <div class="card-info">
            <div class="card-title">${tool.name}</div>
            <div class="card-desc">${tool.desc}</div>
          </div>
        </div>
        ${subfilesHTML}
      `;

      grid.appendChild(card);
    });

    function toggleSub(e, idx) {
      e.preventDefault();
      e.stopPropagation();
      const card = e.target.closest('.card');
      const btn = e.target;
      const isOpen = card.classList.contains('expanded');
      
      if (isOpen) {
        card.classList.remove('expanded');
        btn.textContent = "↓ Lihat " + btn.dataset.count;
      } else {
        card.classList.add('expanded');
        btn.textContent = "↑ Tutup";
      }
    }
  </script>
</body>
</html>
