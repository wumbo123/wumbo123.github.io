<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020111;
            font-family: 'Poppins', sans-serif;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.4);
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <main class="relative z-10 flex min-h-screen flex-col items-center justify-center p-6">
        <div class="glass-panel rounded-3xl p-10 sm:p-14 w-full max-w-2xl flex flex-col items-center text-center transition-all duration-500">
            <h1 id="greetingText" class="text-4xl sm:text-5xl font-bold text-white mb-12 tracking-tight drop-shadow-lg">
                Selamat Datang
            </h1>
            
            <div class="flex flex-wrap justify-center gap-10 sm:gap-16 w-full">
                <a href="/document/" class="group flex flex-col items-center outline-none">
                    <div class="glass-btn w-20 h-20 sm:w-24 sm:h-24 mb-5 flex items-center justify-center rounded-2xl group-hover:-translate-y-2 transition-all duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 sm:w-12 sm:h-12 text-white/80 group-hover:text-blue-400 transition-colors drop-shadow-md" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                        </svg>
                    </div>
                    <span class="font-semibold text-white/80 tracking-widest uppercase text-sm group-hover:text-blue-300 transition-colors drop-shadow">Document</span>
                </a>

                <a href="/0/" class="group flex flex-col items-center outline-none">
                    <div class="glass-btn w-20 h-20 sm:w-24 sm:h-24 mb-5 flex items-center justify-center rounded-2xl group-hover:-translate-y-2 transition-all duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 sm:w-12 sm:h-12 text-white/80 group-hover:text-purple-400 transition-colors drop-shadow-md" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5" />
                        </svg>
                    </div>
                    <span class="font-semibold text-white/80 tracking-widest uppercase text-sm group-hover:text-purple-300 transition-colors drop-shadow">Random Code</span>
                </a>
            </div>
        </div>
    </main>

    <script>
        function updateUI() {
            const now = new Date();
            const hours = now.getHours();
            
            let greeting = 'Selamat Datang';
            if(hours >= 4 && hours < 10) greeting = 'Selamat Pagi';
            else if(hours >= 10 && hours < 15) greeting = 'Selamat Siang';
            else if(hours >= 15 && hours < 18) greeting = 'Selamat Sore';
            else greeting = 'Selamat Malam';

            document.getElementById('greetingText').innerText = greeting;
        }
        
        updateUI();
        setInterval(updateUI, 60000);

        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let fishes = [];
        let splashes = [];
        let stars = [];
        let animTime = 0;

        const colorStops = [
            { t: 0,   skyTop: [2,1,17],     skyBot: [32,18,77],   wave1: [20,20,50], wave2: [10,10,40], wave3: [0,0,30] },
            { t: 4,   skyTop: [2,1,17],     skyBot: [32,18,77],   wave1: [20,20,50], wave2: [10,10,40], wave3: [0,0,30] },
            { t: 5.5, skyTop: [32,18,77],   skyBot: [255,81,47],  wave1: [91,18,72], wave2: [42,8,69],  wave3: [25,5,40] },
            { t: 7,   skyTop: [255,123,0],  skyBot: [255,195,113],wave1: [0,120,180],wave2: [0,80,140], wave3: [0,40,90] },
            { t: 10,  skyTop: [86,204,242], skyBot: [47,128,237], wave1: [0,168,255],wave2: [0,130,220],wave3: [0,90,180] },
            { t: 15,  skyTop: [86,204,242], skyBot: [100,160,250],wave1: [0,168,255],wave2: [0,130,220],wave3: [0,90,180] },
            { t: 17.5,skyTop: [255,81,47],  skyBot: [221,36,118], wave1: [144,28,86],wave2: [91,18,72], wave3: [42,8,69] },
            { t: 19,  skyTop: [32,18,77],   skyBot: [2,1,17],     wave1: [42,8,69],  wave2: [25,5,40],  wave3: [10,2,20] },
            { t: 24,  skyTop: [2,1,17],     skyBot: [32,18,77],   wave1: [20,20,50], wave2: [10,10,40], wave3: [0,0,30] }
        ];

        function getColor(prop, timeOfDay) {
            let start = colorStops[0], end = colorStops[colorStops.length-1];
            for(let i=0; i<colorStops.length-1; i++) {
                if(timeOfDay >= colorStops[i].t && timeOfDay <= colorStops[i+1].t) {
                    start = colorStops[i];
                    end = colorStops[i+1];
                    break;
                }
            }
            let fraction = (end.t === start.t) ? 0 : (timeOfDay - start.t) / (end.t - start.t);
            let r = Math.round(start[prop][0] + (end[prop][0] - start[prop][0]) * fraction);
            let g = Math.round(start[prop][1] + (end[prop][1] - start[prop][1]) * fraction);
            let b = Math.round(start[prop][2] + (end[prop][2] - start[prop][2]) * fraction);
            return `rgb(${r},${g},${b})`;
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<150; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * (height * 0.7),
                    size: Math.random() * 1.5,
                    blinkSpeed: Math.random() * 0.02 + 0.005,
                    alpha: Math.random()
                });
            }
        }
        window.addEventListener('resize', resize);
        resize();

        class Splash {
            constructor(x, y) {
                this.x = x; this.y = y; this.particles = [];
                for (let i = 0; i < 6; i++) {
                    this.particles.push({
                        vx: (Math.random() - 0.5) * 5, vy: -(Math.random() * 3 + 2),
                        life: 1, size: Math.random() * 3 + 1
                    });
                }
            }
            update() {
                this.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.03; });
                this.particles = this.particles.filter(p => p.life > 0);
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                this.particles.forEach(p => {
                    ctx.beginPath(); ctx.arc(this.x + p.x, this.y + p.y, p.size, 0, Math.PI * 2); ctx.fill();
                });
            }
        }

        class JumpingFish {
            constructor() {
                this.x = Math.random() * width;
                this.waterLevel = height * 0.7;
                this.y = this.waterLevel + 50; 
                this.vx = (Math.random() - 0.5) * 6; 
                this.vy = -(10 + Math.random() * 5); 
                this.gravity = 0.4;
                this.angle = 0;
                this.size = 0.6 + Math.random() * 0.4;
                this.hasSplashed = false;
            }
            update() {
                this.x += this.vx; this.y += this.vy; this.vy += this.gravity;
                this.angle = Math.atan2(this.vy, this.vx);
                if (this.y >= this.waterLevel && this.vy > 0 && !this.hasSplashed) {
                    splashes.push(new Splash(this.x, this.waterLevel));
                    this.hasSplashed = true;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.scale(this.size, this.size);
                
                ctx.fillStyle = '#0a0a0a'; 
                ctx.beginPath();
                ctx.ellipse(0, 0, 15, 6, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(-12, 0); ctx.lineTo(-24, -8); ctx.lineTo(-24, 8);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(-4, -5); ctx.lineTo(0, -12); ctx.lineTo(4, -5);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(-4, 5); ctx.lineTo(0, 10); ctx.lineTo(4, 5);
                ctx.fill();
                ctx.restore();
            }
        }

        function drawWave(yOffset, amplitude, frequency, speed, color) {
            ctx.beginPath();
            ctx.moveTo(0, height);
            ctx.lineTo(0, yOffset + Math.sin(animTime * speed) * amplitude);
            for (let x = 0; x <= width + 40; x += 20) {
                let y = yOffset + Math.sin(x * frequency + animTime * speed) * amplitude;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(width + 40, height);
            ctx.lineTo(0, height);
            ctx.fillStyle = color;
            ctx.fill();
        }

        function drawBackgroundAndCelestialBodies(timeOfDay) {
            let bgGrad = ctx.createLinearGradient(0, 0, 0, height * 0.7);
            bgGrad.addColorStop(0, getColor('skyTop', timeOfDay)); 
            bgGrad.addColorStop(1, getColor('skyBot', timeOfDay)); 
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, width, height);

            let starOpacity = 0;
            if (timeOfDay < 6) starOpacity = 1 - (timeOfDay / 6);
            if (timeOfDay > 18) starOpacity = (timeOfDay - 18) / 6;
            
            if (starOpacity > 0) {
                stars.forEach(s => {
                    s.alpha += s.blinkSpeed;
                    if(s.alpha > 1 || s.alpha < 0) s.blinkSpeed *= -1;
                    ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(s.alpha) * starOpacity})`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            let cx = width / 2;
            let sunY = height * 0.8 - Math.sin((timeOfDay - 6) / 12 * Math.PI) * (height * 0.65);
            
            if (timeOfDay >= 5 && timeOfDay <= 19) {
                ctx.beginPath();
                ctx.arc(cx, sunY, 60, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 230, 100, 1)';
                ctx.shadowBlur = 50;
                ctx.shadowColor = 'rgba(255, 200, 0, 0.8)';
                ctx.fill();
                ctx.shadowBlur = 0; 
            }

            let moonTime = (timeOfDay + 12) % 24;
            let moonY = height * 0.8 - Math.sin((moonTime - 6) / 12 * Math.PI) * (height * 0.65);
            
            if (timeOfDay < 7 || timeOfDay > 17) {
                ctx.beginPath();
                ctx.arc(cx, moonY, 40, 0, Math.PI * 2);
                ctx.fillStyle = '#f0f0f0';
                ctx.shadowBlur = 30;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            const now = new Date();
            const currentTime = now.getHours() + (now.getMinutes() / 60) + (now.getSeconds() / 3600);

            drawBackgroundAndCelestialBodies(currentTime);

            if (Math.random() < 0.015 && fishes.length < 8) {
                fishes.push(new JumpingFish());
            }

            splashes.forEach(s => { s.update(); s.draw(); });
            splashes = splashes.filter(s => s.particles.length > 0);

            drawWave(height * 0.68, 15, 0.003, 1.5, getColor('wave1', currentTime));

            fishes.forEach(f => { f.update(); f.draw(); });
            fishes = fishes.filter(f => f.y < height + 100);

            drawWave(height * 0.72, 25, 0.002, 2.0, getColor('wave2', currentTime));
            drawWave(height * 0.78, 35, 0.0015, 2.5, getColor('wave3', currentTime));

            animTime += 0.02; 
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
