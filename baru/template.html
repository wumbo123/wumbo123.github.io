<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2×2 Photo Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
        }

        .upload-section {
            background: #16213e;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .upload-section h2 {
            color: #fff;
            margin-bottom: 20px;
        }

        .upload-btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.3s;
        }

        .upload-btn:hover {
            transform: scale(1.05);
        }

        .upload-btn input {
            display: none;
        }

        .preset-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .preset-btn {
            padding: 12px 30px;
            background: #0f3460;
            color: #fff;
            border: 2px solid #667eea;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .preset-btn.active {
            background: #667eea;
        }

        .preset-btn:hover {
            background: #667eea;
        }

        .generate-btn {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 20px auto;
            padding: 15px 40px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.3s;
        }

        .generate-btn:hover {
            transform: scale(1.05);
        }

        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .preview-section {
            display: none;
            background: #16213e;
            padding: 30px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .preview-section.active {
            display: block;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .preview-header h2 {
            color: #fff;
        }

        .download-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.3s;
        }

        .download-btn:hover {
            transform: scale(1.05);
        }

        .preview-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            aspect-ratio: 1;
            background: #0a0a1a;
            border-radius: 10px;
            overflow: hidden;
        }

        .preview-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .crosshair {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }

        .crosshair::before {
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            transform: translateY(-50%);
        }

        .crosshair::after {
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            transform: translateX(-50%);
        }

        .crosshair-dashed::before,
        .crosshair-dashed::after {
            background: repeating-linear-gradient(
                90deg,
                rgba(255, 255, 255, 0.8) 0,
                rgba(255, 255, 255, 0.8) 10px,
                transparent 10px,
                transparent 20px
            );
        }

        .crosshair-dashed::after {
            background: repeating-linear-gradient(
                0deg,
                rgba(255, 255, 255, 0.8) 0,
                rgba(255, 255, 255, 0.8) 10px,
                transparent 10px,
                transparent 20px
            );
        }

        .controls {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .control-group {
            background: #0f3460;
            padding: 20px;
            border-radius: 10px;
        }

        .control-group label {
            display: block;
            color: #fff;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #1a1a2e;
            outline: none;
            -webkit-appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
        }

        .control-value {
            color: #667eea;
            font-weight: bold;
            font-size: 14px;
        }

        .file-info {
            color: #667eea;
            margin-top: 15px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2×2 Photo Generator</h1>

        <div class="upload-section">
            <h2>Upload Foto</h2>
            <label class="upload-btn">
                <input type="file" id="imageInput" accept="image/*">
                📁 Pilih Gambar
            </label>
            <div class="file-info" id="fileInfo"></div>
        </div>

        <div class="preset-section">
            <button class="preset-btn active" data-size="2160">2×2 (2160×2160)</button>
        </div>

        <button class="generate-btn" id="generateBtn" disabled>Generate</button>

        <div class="preview-section" id="previewSection">
            <div class="preview-header">
                <h2>Live Preview</h2>
                <button class="download-btn" id="downloadBtn">⬇ Download</button>
            </div>

            <div class="preview-container">
                <canvas id="previewCanvas" class="preview-canvas"></canvas>
                <div class="crosshair crosshair-dashed"></div>
            </div>

            <div class="controls">
                <div class="control-group">
                    <label>Posisi Vertikal (Atur Atas-Bawah) <span class="control-value" id="vValue">50%</span></label>
                    <input type="range" id="vPosSlider" min="0" max="100" value="50">
                </div>
                <div class="control-group">
                    <label>Posisi Horizontal (Kiri-Kanan) <span class="control-value" id="hValue">50%</span></label>
                    <input type="range" id="hPosSlider" min="0" max="100" value="50">
                </div>
                <div class="control-group" style="grid-column: 1 / -1;">
                    <label>Zoom <span class="control-value" id="zoomValue">100%</span></label>
                    <input type="range" id="zoomSlider" min="10" max="300" value="100">
                </div>
            </div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const generateBtn = document.getElementById('generateBtn');
        const previewSection = document.getElementById('previewSection');
        const previewCanvas = document.getElementById('previewCanvas');
        const downloadBtn = document.getElementById('downloadBtn');
        const fileInfo = document.getElementById('fileInfo');

        const vPosSlider = document.getElementById('vPosSlider');
        const hPosSlider = document.getElementById('hPosSlider');
        const zoomSlider = document.getElementById('zoomSlider');

        const vValue = document.getElementById('vValue');
        const hValue = document.getElementById('hValue');
        const zoomValue = document.getElementById('zoomValue');

        let uploadedImage = null;
        let canvasSize = 2160;

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                fileInfo.textContent = `File: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        uploadedImage = img;
                        generateBtn.disabled = false;
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        generateBtn.addEventListener('click', function() {
            if (uploadedImage) {
                previewSection.classList.add('active');
                vPosSlider.value = 50;
                hPosSlider.value = 50;
                zoomSlider.value = 100;
                updatePreview();
            }
        });

        function updatePreview() {
            const ctx = previewCanvas.getContext('2d');
            const container = document.querySelector('.preview-container');
            const displaySize = container.clientWidth;

            previewCanvas.width = displaySize;
            previewCanvas.height = displaySize;

            ctx.clearRect(0, 0, displaySize, displaySize);

            if (uploadedImage) {
                const vPos = vPosSlider.value / 100;
                const hPos = hPosSlider.value / 100;
                const zoom = zoomSlider.value / 100;

                const imgRatio = uploadedImage.width / uploadedImage.height;
                let drawWidth, drawHeight;

                if (imgRatio > 1) {
                    drawHeight = displaySize * zoom;
                    drawWidth = drawHeight * imgRatio;
                } else {
                    drawWidth = displaySize * zoom;
                    drawHeight = drawWidth / imgRatio;
                }

                const x = (displaySize - drawWidth) * hPos;
                const y = (displaySize - drawHeight) * vPos;

                ctx.drawImage(uploadedImage, x, y, drawWidth, drawHeight);
            }

            vValue.textContent = vPosSlider.value + '%';
            hValue.textContent = hPosSlider.value + '%';
            zoomValue.textContent = zoomSlider.value + '%';
        }

        vPosSlider.addEventListener('input', updatePreview);
        hPosSlider.addEventListener('input', updatePreview);
        zoomSlider.addEventListener('input', updatePreview);

        downloadBtn.addEventListener('click', function() {
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = canvasSize;
            exportCanvas.height = canvasSize;
            const ctx = exportCanvas.getContext('2d');

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvasSize, canvasSize);

            if (uploadedImage) {
                const vPos = vPosSlider.value / 100;
                const hPos = hPosSlider.value / 100;
                const zoom = zoomSlider.value / 100;

                const imgRatio = uploadedImage.width / uploadedImage.height;
                let drawWidth, drawHeight;

                if (imgRatio > 1) {
                    drawHeight = canvasSize * zoom;
                    drawWidth = drawHeight * imgRatio;
                } else {
                    drawWidth = canvasSize * zoom;
                    drawHeight = drawWidth / imgRatio;
                }

                const x = (canvasSize - drawWidth) * hPos;
                const y = (canvasSize - drawHeight) * vPos;

                ctx.drawImage(uploadedImage, x, y, drawWidth, drawHeight);
            }

            const link = document.createElement('a');
            link.download = 'photo-2x2-2160x2160.png';
            link.href = exportCanvas.toDataURL('image/png');
            link.click();
        });

        window.addEventListener('resize', function() {
            if (previewSection.classList.contains('active')) {
                updatePreview();
            }
        });
    </script>
</body>
</html>
