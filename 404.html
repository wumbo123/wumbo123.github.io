<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Tidak Ditemukan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Space Mono', monospace;
      background: #0d0d0d;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 420px;
      text-align: center;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 700;
      line-height: 1;
      color: #ff6b35;
      margin-bottom: 8px;
      letter-spacing: -4px;
    }
    .error-code span {
      color: #222;
    }
    h1 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    p {
      color: #555;
      font-size: 0.85rem;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    a {
      display: inline-block;
      padding: 14px 28px;
      background: #ff6b35;
      color: #0d0d0d;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 700;
      border-radius: 8px;
      transition: all 0.15s ease;
    }
    a:hover {
      background: #ff8555;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">4<span>0</span>4</div>
    <h1>Halaman Tidak Ditemukan</h1>
    <p>Url yang kamu akses tidak tersedia.<br>Mungkin sudah dihapus atau salah ketik.</p>
    <a href="/">← Kembali ke Home</a>
  </div>
</body>
</html>
